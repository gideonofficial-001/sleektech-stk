<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sleek POS - M-Pesa Payment</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>Sleek POS</h1>
    <h2>M-Pesa Payment</h2>

    <form id="paymentForm">
      <label>Customer Phone</label>
      <input
  type="tel"
  id="phone"
  placeholder="0712345678"
  pattern="[0-9]{10,12}"
  maxlength="12"
  required
/>

      <label>Amount (KES)</label>
      <input type="number" id="amount" placeholder="Enter amount" required />

      <button type="submit">Initiate STK Push</button>
    </form>

    <div id="statusMessage"></div>
  </div>

<script>
const backendUrl = "https://sleek-pos-backend.onrender.com/api/stkpush";

document.getElementById('paymentForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const phone = document.getElementById('phone').value.trim();
  const amount = document.getElementById('amount').value.trim();
  const statusDiv = document.getElementById('statusMessage');

  // Phone validation
  if (!/^\d{10,12}$/.test(phone)) {
    statusDiv.innerText = "Enter valid phone number (0712345678)";
    statusDiv.className = "error";
    return;
  }

  // Amount validation
  if (isNaN(amount) || amount <= 0) {
    statusDiv.innerText = "Enter valid amount";
    statusDiv.className = "error";
    return;
  }

  statusDiv.innerText = "Sending STK Push...";
  statusDiv.className = "info";

  try {
    const response = await fetch(backendUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ phone, amount })
    });

    const data = await response.json();

    console.log("Backend response:", data); // debugging

    if (data.ResponseCode === "0") {
      statusDiv.innerText = "STK Sent. Check phone for PIN prompt.";
      statusDiv.className = "success";
    } else {
      statusDiv.innerText = data.errorMessage || data.error || "STK failed.";
      statusDiv.className = "error";
    }

  } catch (err) {
    console.error(err);
    statusDiv.innerText = "Server unreachable.";
    statusDiv.className = "error";
  }
});
</script>

</body>
</html>
