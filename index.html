<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SleekTech Pay — M-PESA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #3bb56a;
      --green-dark: #1e7c43;
      --green-light: #d4f5e2;
      --black: #0a0f0d;
      --surface: #111915;
      --card: #172118;
      --border: rgba(59,181,106,0.18);
      --text: #e8f5ec;
      --muted: #7baa8a;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--black);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: -120px; left: -120px;
      width: 480px; height: 480px;
      background: radial-gradient(circle, rgba(59,181,106,0.18) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      animation: drift 8s ease-in-out infinite alternate;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -80px; right: -80px;
      width: 360px; height: 360px;
      background: radial-gradient(circle, rgba(30,124,67,0.14) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      animation: drift 10s ease-in-out infinite alternate-reverse;
    }
    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(30px,30px) scale(1.08); }
    }

    .page {
      width: 100%;
      max-width: 420px;
      padding: 24px 16px;
      position: relative;
      z-index: 1;
      animation: fadeUp .6s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header { text-align: center; margin-bottom: 36px; }
    .logo-wrap {
      display: inline-flex; align-items: center; gap: 10px; margin-bottom: 6px;
    }
    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 24px rgba(59,181,106,0.4);
    }
    .logo-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 22px; letter-spacing: -0.5px;
      background: linear-gradient(90deg, #fff, var(--green));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .tagline { font-size: 13px; color: var(--muted); letter-spacing: 0.4px; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 24px 32px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(59,181,106,0.12);
    }

    .card-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .card-sub   { font-size: 13px; color: var(--muted); margin-bottom: 28px; }

    .field { margin-bottom: 18px; }
    label {
      display: block; font-size: 12px; font-weight: 500;
      color: var(--muted); letter-spacing: 0.6px; text-transform: uppercase; margin-bottom: 8px;
    }
    .input-wrap { position: relative; display: flex; align-items: center; }
    .input-icon { position: absolute; left: 14px; font-size: 16px; color: var(--green); pointer-events: none; }
    input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 13px 14px 13px 42px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input::placeholder { color: rgba(123,170,138,0.4); }
    input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(59,181,106,0.12); }

    .amount-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 18px; }
    .preset-btn {
      background: rgba(59,181,106,0.07);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--green);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500;
      padding: 9px 6px; cursor: pointer;
      transition: all .18s; text-align: center;
    }
    .preset-btn:hover, .preset-btn.active {
      background: rgba(59,181,106,0.18);
      border-color: var(--green);
      box-shadow: 0 0 12px rgba(59,181,106,0.2);
    }

    .pay-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      border: none; border-radius: 14px;
      color: #fff; cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 16px; font-weight: 700; letter-spacing: 0.3px;
      padding: 16px; margin-top: 8px;
      position: relative; overflow: hidden;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 4px 20px rgba(59,181,106,0.35);
    }
    .pay-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(59,181,106,0.45); }
    .pay-btn:active:not(:disabled) { transform: translateY(0); }
    .pay-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .pay-btn .btn-shine {
      position: absolute; top: -50%; left: -60%;
      width: 50%; height: 200%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transform: skewX(-20deg); transition: left .5s; pointer-events: none;
    }
    .pay-btn:hover .btn-shine { left: 120%; }

    .status-box {
      margin-top: 20px; border-radius: 12px; padding: 14px 16px;
      font-size: 14px; display: none; animation: fadeUp .3s ease both;
    }
    .status-box.info    { background: rgba(59,181,106,0.1);  border: 1px solid rgba(59,181,106,0.3); color: var(--green); }
    .status-box.error   { background: rgba(220,60,60,0.1);   border: 1px solid rgba(220,60,60,0.3);  color: #f87171; }
    .status-box.success { background: rgba(59,181,106,0.15); border: 1px solid var(--green);          color: #86efac; }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .mpesa-badge {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; font-size: 12px; color: var(--muted); margin-top: 22px;
    }
    .mpesa-badge span { font-weight: 700; color: var(--green); font-size: 13px; }

    .sandbox-note {
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,200,0,0.07); border: 1px solid rgba(255,200,0,0.2);
      border-radius: 8px; padding: 8px 12px; font-size: 12px; color: #fde68a; margin-bottom: 20px;
    }
  </style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="logo-wrap">
      <div class="logo-icon">💳</div>
      <span class="logo-name">SleekTech</span>
    </div>
    <p class="tagline">Secure M-PESA Payments</p>
  </div>

  <div class="card">
    <div class="sandbox-note">⚠️ Sandbox Mode — test transactions only</div>

    <p class="card-title">Make a Payment</p>
    <p class="card-sub">An STK push will be sent to your M-PESA phone.</p>

    <div class="field">
      <label>Phone Number</label>
      <div class="input-wrap">
        <span class="input-icon">📱</span>
        <input type="tel" id="phone" placeholder="07XX XXX XXX" maxlength="10" />
      </div>
    </div>

    <div class="field">
      <label>Quick Amounts (KES)</label>
      <div class="amount-grid">
        <button class="preset-btn" onclick="setAmount(50,this)">KES 50</button>
        <button class="preset-btn" onclick="setAmount(100,this)">KES 100</button>
        <button class="preset-btn" onclick="setAmount(250,this)">KES 250</button>
        <button class="preset-btn" onclick="setAmount(500,this)">KES 500</button>
        <button class="preset-btn" onclick="setAmount(1000,this)">KES 1,000</button>
        <button class="preset-btn" onclick="setAmount(2000,this)">KES 2,000</button>
      </div>
    </div>

    <div class="field">
      <label>Amount (KES)</label>
      <div class="input-wrap">
        <span class="input-icon">💵</span>
        <input type="number" id="amount" placeholder="Enter custom amount" min="1" />
      </div>
    </div>

    <div class="field">
      <label>Reference / Order ID</label>
      <div class="input-wrap">
        <span class="input-icon">🔖</span>
        <input type="text" id="reference" placeholder="e.g. ORDER-001" />
      </div>
    </div>

    <button class="pay-btn" id="payBtn" onclick="initiateStkPush()">
      <div class="btn-shine"></div>
      <span id="btnText">Pay with M-PESA</span>
    </button>

    <div class="status-box" id="statusBox"></div>

    <div class="mpesa-badge">🔒 Powered by <span>M-PESA</span> Daraja API</div>
  </div>
</div>

<script>
  function setAmount(val, btn) {
    document.getElementById('amount').value = val;
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function showStatus(msg, type = 'info') {
    const box = document.getElementById('statusBox');
    box.innerHTML = msg;
    box.className = `status-box ${type}`;
    box.style.display = 'block';
  }

  function setLoading(loading) {
    const btn  = document.getElementById('payBtn');
    const text = document.getElementById('btnText');
    btn.disabled = loading;
    text.innerHTML = loading
      ? '<span class="spinner"></span>Sending STK Push…'
      : 'Pay with M-PESA';
  }

  function formatPhone(raw) {
    const digits = raw.replace(/\D/, '');
    if (digits.startsWith('0') && digits.length === 10)   return '254' + digits.slice(1);
    if (digits.startsWith('254') && digits.length === 12) return digits;
    return null;
  }

  async function initiateStkPush() {
    const rawPhone = document.getElementById('phone').value.trim();
    const amount   = parseInt(document.getElementById('amount').value, 10);
    const ref      = document.getElementById('reference').value.trim() || 'SleekTechPay';
    const phone    = formatPhone(rawPhone);

    if (!phone)              return showStatus('❌ Enter a valid Safaricom number (07XX or 2547XX).', 'error');
    if (!amount || amount < 1) return showStatus('❌ Enter a valid amount (min KES 1).', 'error');

    setLoading(true);
    showStatus('📲 Initiating M-PESA payment…', 'info');

    try {
      // ✅ Calls our Netlify serverless function — no CORS, credentials stay server-side
      const res  = await fetch('/api/mpesa', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ phone, amount, reference: ref })
      });
      const data = await res.json();

      if (data.ResponseCode === '0') {
        showStatus(
          '✅ <strong>STK Push Sent!</strong><br>' +
          'Check your phone and enter your M-PESA PIN to complete.<br>' +
          `<small style="opacity:.7">ID: ${data.CheckoutRequestID}</small>`,
          'success'
        );
      } else {
        showStatus('⚠️ ' + (data.errorMessage || data.ResponseDescription || data.error || 'Unknown error'), 'error');
      }
    } catch (err) {
      showStatus('❌ Network error — please try again.<br><small>' + err.message + '</small>', 'error');
    } finally {
      setLoading(false);
    }
  }

  document.getElementById('amount').addEventListener('input', () => {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  });
</script>
</body>
</html>
